<!doctype html>
<html lang="en">
	<head>
		<link href="popup.css" rel="stylesheet" />
	</head>
	<body>
		<div class="extension">
			<img
				class="extension__logo"
				src="/images/blindboxd-logo.svg"
				alt="Horizontal logo for Letterboxd"
			/>
			<div class="extension__toggles-container">
				<div class="extension__ratings-toggle-container">
					<span class="extension__ratings-toggle-text">Hide Ratings</span>
					<label class="extension__ratings-toggle" for="ratings-toggle">
						<input
							class="extension__ratings-toggle-checkbox"
							id="ratings-toggle"
							type="checkbox"
						/>
						<span class="extension__ratings-toggle-slider"></span>
					</label>
				</div>
				<div class="extension__reviews-toggle-container">
					<span class="extension__reviews-toggle-text">Hide Reviews</span>
					<label class="extension__reviews-toggle" for="reviews-toggle">
						<input
							class="extension__reviews-toggle-checkbox"
							id="reviews-toggle"
							type="checkbox"
						/>
						<span class="extension__reviews-toggle-slider"></span>
					</label>
				</div>
			</div>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
